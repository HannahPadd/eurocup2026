name: Build Main

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker metadata for viewer
        id: meta_viewer
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/tournamentviewer
          tags: |
            type=sha
            type=raw,value=dev
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=tournamentviewer
            org.opencontainers.image.description=Non-production build from main branch
            org.opencontainers.image.version=dev
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.vendor=non-production
            org.opencontainers.image.ref.name=main
            com.yourproject.environment=development
            com.yourproject.production=false

      - name: Build & Push viewer
        uses: docker/build-push-action@v6
        with:
          context: ./tournament_viewer
          file: ./tournament_viewer/Dockerfile
          push: true
          tags: ${{ steps.meta_viewer.outputs.tags }}
          labels: ${{ steps.meta_viewer.outputs.labels }}
          secrets: |
            vite_api_base_url=${{ secrets.VITE_API_BASE_URL }}

      - name: Set up Docker metadata for backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/tournamentserver
          tags: |
            type=sha
            type=raw,value=dev
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=tournamentserver
            org.opencontainers.image.description=Non-production build from main branch
            org.opencontainers.image.version=dev
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.vendor=non-production
            org.opencontainers.image.ref.name=main
            com.yourproject.environment=development
            com.yourproject.production=false

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./tournament_server
          file: ./tournament_server/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          build-args: |
            NODE_ENV=production
          secrets: |
            jwt_secret=${{ secrets.JWT_SECRET }}
            cors_origin=${{ secrets.CORS_ORIGIN }}
